<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeneHub | Panel de Administración</title>
  <meta name="description" content="Panel de administración del catálogo de beneficios de BeneHub" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💼</text></svg>" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="portal-header">
    <div class="portal-header-inner">
      <div class="portal-brand">
        <span class="auth-logo">💼</span>
        <div>
          <h1>BeneHub · Admin</h1>
          <p class="portal-tagline">Gestión del catálogo de beneficios</p>
        </div>
      </div>
      <div class="portal-user">
        <span id="user-email" class="user-email"></span>
        <a href="index.html" class="btn btn-outline">Volver al portal</a>
        <button id="btn-logout" class="btn btn-outline">Cerrar sesión</button>
      </div>
    </div>
  </header>

  <main class="portal-main">
    <p id="admin-status-message" class="admin-status-message" hidden></p>

    <div id="admin-content" hidden>
      <div class="admin-toolbar">
        <h2>Beneficios (<span id="admin-count">0</span>)</h2>
        <button id="btn-new-benefit" class="btn btn-primary">+ Agregar beneficio</button>
      </div>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>Condiciones elegibles</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="admin-table-body"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal de creación / edición de beneficio -->
  <div id="admin-modal" class="modal-overlay" hidden>
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="admin-modal-title">
      <button id="admin-modal-close" class="modal-close" aria-label="Cerrar">✕</button>
      <h2 id="admin-modal-title" class="modal-title">Nuevo beneficio</h2>

      <form id="admin-form" class="admin-form">
        <input type="hidden" id="f-id" />

        <label for="f-nombre">Nombre</label>
        <input type="text" id="f-nombre" required />

        <label for="f-categoria">Categoría</label>
        <select id="f-categoria" required>
          <option value="Salud">Salud</option>
          <option value="Bienestar">Bienestar</option>
          <option value="Finanzas">Finanzas</option>
          <option value="Tiempo Libre">Tiempo Libre</option>
        </select>

        <label for="f-descripcion">Descripción</label>
        <textarea id="f-descripcion" rows="2" required></textarea>

        <label for="f-cobertura">Cobertura</label>
        <textarea id="f-cobertura" rows="3" required></textarea>

        <label for="f-proveedor-nombre">Nombre del proveedor</label>
        <input type="text" id="f-proveedor-nombre" required />

        <label for="f-proveedor-url">URL del proveedor</label>
        <input type="url" id="f-proveedor-url" required placeholder="https://..." />

        <label for="f-facilitador-nombre">Nombre del facilitador interno</label>
        <input type="text" id="f-facilitador-nombre" required />

        <label for="f-facilitador-email">Correo del facilitador</label>
        <input type="email" id="f-facilitador-email" required />

        <label for="f-facilitador-telefono">Teléfono del facilitador</label>
        <input type="text" id="f-facilitador-telefono" required />

        <label for="f-palabras-clave">Palabras clave (separadas por coma)</label>
        <input type="text" id="f-palabras-clave" placeholder="odontólogo, dientes, dental" />

        <label>Condiciones de cargo elegibles (ninguna marcada = visible para todas)</label>
        <div class="checkbox-row">
          <label class="checkbox-label"><input type="checkbox" id="f-condicion-pasante" /> Pasante</label>
          <label class="checkbox-label"><input type="checkbox" id="f-condicion-temporal" /> Temporal</label>
          <label class="checkbox-label"><input type="checkbox" id="f-condicion-fijo" /> Fijo</label>
        </div>

        <label class="checkbox-label checkbox-label-standalone">
          <input type="checkbox" id="f-activo" /> Beneficio activo (visible en el portal)
        </label>

        <p id="admin-form-message" class="auth-message" role="status" aria-live="polite"></p>

        <div class="auth-actions">
          <button type="submit" class="btn btn-primary">Guardar</button>
          <button type="button" id="admin-cancel" class="btn btn-outline">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
